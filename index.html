<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSR Control Panel</title>

<style>
#radio-console{
 max-width:320px;
 margin:auto;
 padding:20px;
 border-radius:26px;
 background:linear-gradient(180deg,#121212,#0c0c0c);
 font-family:'Cormorant Garamond','Segoe UI',serif;
 color:#FFD700;
 text-align:center;
 box-shadow:
 0 0 55px rgba(201,162,39,.75),
 0 0 95px rgba(184,134,11,.45);
}

.clock{margin-bottom:18px}
#time{
 font-size:2.2em;
 text-shadow:0 0 10px #FFD700,0 0 25px #C9A227;
}
#date{
 margin-top:6px;
 font-size:1em;
 text-shadow:0 0 8px #FFD700;
}

#albumArt{
 width:240px;
 height:240px;
 object-fit:cover;
 border-radius:18px;
 margin-bottom:18px;
 animation:pulse 2.6s infinite alternate;
 box-shadow:0 0 35px #C9A227,0 0 65px #B8860B;
}

#artist{
 font-size:1.5em;
 font-weight:bold;
 margin-bottom:10px;
}
#title{
 font-size:1.6em;
 opacity:.9;
}

#dj-box{
 margin-top:16px;
 padding:10px;
 border-radius:14px;
 background:rgba(0,0,0,.2);
 box-shadow:inset 0 0 15px rgba(255,215,0,.25);
}
.label{
 font-size:.8em;
 opacity:.7;
}
#dj-name{
 font-size:1.2em;
 margin-top:4px;
}
#dj-desc{
 font-size:.85em;
 opacity:.85;
 margin-top:4px;
}

#visualizer{
 width:100%;
 margin-top:18px;
 border-radius:10px;
 background:#020114;
}

/* NEW CONTROL BUTTON */
.control-btn{
 margin-top:20px;
 padding:12px 18px;
 border:none;
 border-radius:10px;
 background:#FFD700;
 color:#000;
 font-weight:bold;
 cursor:pointer;
}

.control-btn:hover{
 background:#e6c200;
}

#status{
 margin-top:10px;
 font-size:0.9em;
 opacity:0.8;
}

#preview{
 margin-top:8px;
 font-size:0.9em;
 opacity:0.7;
}

@keyframes pulse{
 from{transform:scale(1)}
 to{transform:scale(1.05)}
}

@media(max-width:600px){
 #albumArt{width:180px;height:180px}
 #time{font-size:1.8em}
}
</style>
</head>

<body>

<div id="radio-console">

  <!-- CLOCK -->
  <div class="clock">
    <div id="time"></div>
    <div id="date"></div>
  </div>

  <!-- ALBUM ART -->
  <img id="albumArt" src="https://i.imgur.com/QPevqGi.png">

  <!-- TRACK INFO -->
  <div id="track-info">
    <div id="artist">Loading…</div>
    <div id="title">Please wait</div>
    <div id="preview"></div>
  </div>

  <!-- CONTROL BUTTON -->
  <button class="control-btn" onclick="triggerPost()">
    📢 Post Now Playing
  </button>
  <div id="status"></div>

  <!-- DJ SPOTLIGHT -->
  <div id="dj-box">
    <div class="label">DJ Spotlight</div>
    <div id="dj-name">Loading…</div>
    <div id="dj-desc"></div>
  </div>

  <!-- VISUALIZER -->
  <canvas id="visualizer"></canvas>

</div>

<script>
/* ================= CONFIG ================= */
const API="https://api.radioking.io/widget/radio/the-channel-x/track/current";

/* ================= DJ DATABASE ================= */
const DJs=[
  {name:"DJ Cocomotion",desc:"The Music Mixologist blending the finest house tracks seamlessly."},
  {name:"Rudy Cassago",desc:"It's a super-special saturday night treat each time Rudy presents The Global Dance Radio Charts."},
  {name:"Davy Sims",desc:"A journey through the heart and soul of global music with a true connoisseur."},
  {name:"Alfiya Glow",desc:"Signature electronic violin and radiant house energy."},
  {name:"Landry DJ",desc:"Global house rhythms with a dancefloor pulse."},
  {name:"Gabriel Deb",desc:"Soulful house curated to perfection."},
  {name:"Avi Sic",desc:"High-energy club selections."},
  {name:"Mkuu Amani",desc:"Fresh tracks and aspiring artists from across the genres."},
  {name:"Shooma",desc:"Sonic journeys to make you move inside and out."},
  {name:"Gabriel Dancer",desc:"Hungarian DJ and Producer Association: BREAKTHROUGH OF THE YEAR 2023"},
  {name:"Chris Brooks",desc:"The UK's favourite songs in the exceptional hands of a radio maestro."}
];

let djIndex=0;
let detectedDJ=null;

/* ================= CLOCK ================= */
function updateClock(){
 const now=new Date();
 document.getElementById("time").textContent=
  now.toLocaleTimeString('en-GB',{hour12:false});
 document.getElementById("date").textContent=
  now.toLocaleDateString(undefined,{
   weekday:'short',year:'numeric',month:'short',day:'numeric'
  });
}
setInterval(updateClock,1000);
updateClock();

/* ================= NOW PLAYING ================= */
async function updateNowPlaying(){
 try{
  const res=await fetch(API,{cache:"no-store"});
  const t=await res.json();

  const artistName=t.artist||"Unknown Artist";
  const titleName=t.title||"Unknown Title";

  document.getElementById("artist").textContent=artistName;
  document.getElementById("title").textContent=titleName;

  document.getElementById("albumArt").src=
    t.cover||"https://i.imgur.com/QPevqGi.png";

  // PREVIEW TEXT (NEW)
  document.getElementById("preview").textContent =
    "Ready to post: " + artistName + " - " + titleName;

  detectDJ(artistName);

 }catch{
  document.getElementById("artist").textContent="Stream Offline";
 }
}
setInterval(updateNowPlaying,15000);
updateNowPlaying();

/* ================= POST BUTTON ================= */
function triggerPost(){
 if(!confirm("Post current track to Facebook?")) return;

 document.getElementById("status").innerText="Sending...";

 fetch("https://hooks.zapier.com/hooks/catch/25494123/ugnx0s6/", {
  method:"POST"
 })
 .then(()=>{
  document.getElementById("status").innerText="Posted successfully!";
 })
 .catch(()=>{
  document.getElementById("status").innerText="Error sending request.";
 });
}

/* ================= DJ DETECTION ================= */
function detectDJ(text){
 const match=DJs.find(d=>text.toLowerCase().includes(d.name.toLowerCase()));
 detectedDJ=match||null;
 updateDJ();
}

function updateDJ(){
 let dj;

 if(detectedDJ){
  dj=detectedDJ;
 }else{
  dj=DJs[djIndex];
  djIndex=(djIndex+1)%DJs.length;
 }

 document.getElementById("dj-name").textContent=dj.name;
 document.getElementById("dj-desc").textContent=dj.desc;
}

setInterval(()=>{
 if(!detectedDJ) updateDJ();
},15000);

updateDJ();

/* ================= VISUALIZER ================= */
const canvas=document.getElementById("visualizer");
const ctx=canvas.getContext("2d");

function resize(){
 canvas.width=canvas.clientWidth;
 canvas.height=120;
}
window.addEventListener("resize",resize);
resize();

let hue=0;

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 const bars=30;
 for(let i=0;i<bars;i++){
  const h=(hue+i*10)%360;
  const height=20+Math.abs(Math.sin(Date.now()/200+i))*80;

  ctx.fillStyle=`hsl(${h},100%,50%)`;
  ctx.fillRect(
   i*(canvas.width/bars),
   canvas.height-height,
   canvas.width/bars-2,
   height
  );
 }
 hue=(hue+0.7)%360;
 requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
