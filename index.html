<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PSR Control Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 50px;
    }

    h1 {
      margin-bottom: 40px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1db954;
      color: white;
    }

    button:hover {
      background: #17a74a;
    }

    #cover {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      margin-top: 20px;
    }

    #track {
      margin-top: 15px;
      font-size: 18px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 6px;
      border: none;
      margin-top: 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>🎧 Prodigal Sun Radio Control</h1>

  <!-- Now Playing -->
  <img id="cover" src="https://i.imgur.com/QPevqGi.png">
  <div id="track">Loading current track...</div>

  <!-- Manual post to Facebook -->
  <button onclick="postNowPlaying()">Post Now Playing</button>
  <p id="status"></p>

  <!-- Ticker Control -->
  <div>
    <input id="tickerInput" placeholder="Enter ticker message">
    <button onclick="sendTicker()">Update Ticker</button>
  </div>

  <script>
    /* =========================
    CONFIG
    ========================= */
    const NOW_PLAYING_API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";
    const ZAPIER_HOOK = "https://hooks.zapier.com/hooks/catch/25494123/ugnx0s6/";
    const TICKER_API = "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE"; // Google Script for ticker

    /* =========================
    FETCH NOW PLAYING
    ========================= */
    async function updateNowPlaying() {
      try {
        const res = await fetch(NOW_PLAYING_API, { cache: "no-store" });
        const data = await res.json();

        const artist = data.artist || "Unknown Artist";
        const title = data.title || "Unknown Title";
        const cover = data.cover || "https://i.imgur.com/QPevqGi.png";

        document.getElementById("track").innerText = artist + " - " + title;
        document.getElementById("cover").src = cover;
      } catch(err) {
        document.getElementById("track").innerText = "Unable to load track";
      }
    }

    updateNowPlaying();
    setInterval(updateNowPlaying, 15000);

    /* =========================
    POST TO FACEBOOK (Zapier)
    ========================= */
    function postNowPlaying() {
      document.getElementById("status").innerText = "Sending...";

      fetch(ZAPIER_HOOK, { method: "POST" })
        .then(response => {
          document.getElementById("status").innerText = "Posted successfully!";
        })
        .catch(error => {
          document.getElementById("status").innerText = "Error sending request.";
        });
    }

    /* =========================
    SEND TICKER MESSAGE
    ========================= */
    function sendTicker() {
      const msg = document.getElementById("tickerInput").value.trim();
      if(!msg) return alert("Enter a message");

      fetch(TICKER_API, {
        method: "POST",
        body: JSON.stringify({ message: msg })
      })
      .then(() => {
        alert("Ticker updated!");
        document.getElementById("tickerInput").value = "";
      })
      .catch(() => alert("Error updating ticker"));
    }
  </script>

</body>
</html>
