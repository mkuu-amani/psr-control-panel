<!-- PRODIGAL SUN RADIO MANUAL TICKER -->
<div class="psr-ticker">
  <div class="psr-label">PSR LIVE</div>
  <div class="psr-wrap">
    <div class="psr-move" id="psrTicker"></div>
  </div>
</div>

<style>
.psr-ticker{
  display:flex;
  align-items:center;
  background:#0b0b0b;
  border-radius:14px;
  padding:10px 16px;
  overflow:hidden;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

.psr-label{
  font-size:18px;
  font-weight:700;
  margin-right:14px;
  color:#f7c873;
  white-space:nowrap;
}

.psr-wrap{
  flex:1;
  overflow:hidden;
}

.psr-move{
  display:inline-flex;
  gap:56px;
  white-space:nowrap;
}

.psr-move span{
  font-size:18px;
  color:#f7c873;
}

@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

.psr-ticker:hover .psr-move{
  animation-play-state:paused;
}
</style>

<script>
/* =========================
CONFIG
========================= */
const ticker = document.getElementById("psrTicker");
const scrollSpeed = 55; // px per second

// Google Script doGet URL for control panel messages
const SHEET_API = "https://script.google.com/macros/s/AKfycbwUjfx6Wm0etSb4V3GO6WjxNp6veeAFcCtlSRZqJI3olyWGhhaZHM3Sa1KTeRwXN-Bo/exec";

/* =========================
HELPER FUNCTIONS
========================= */
async function getSheetMessages() {
  try {
    const res = await fetch(SHEET_API);
    const data = await res.json();
    return data; // expects array of strings
  } catch(err) {
    console.log("Error fetching ticker messages", err);
    return [];
  }
}

function addToTicker(text) {
  const span = document.createElement("span");
  span.textContent = text;
  ticker.appendChild(span);
}

/* =========================
BUILD TICKER
========================= */
async function buildTicker() {
  ticker.innerHTML = ""; // clear previous content (only once on load)

  const sheetMessages = await getSheetMessages();
  if(sheetMessages.length === 0){
    addToTicker("No messages yet. Add some via the control panel!");
  } else {
    sheetMessages.forEach(msg => addToTicker(msg));
  }

  // Duplicate for smooth infinite scroll
  ticker.innerHTML += ticker.innerHTML;

  // Start animation
  const move = document.querySelector(".psr-move");
  const totalWidth = move.scrollWidth;
  const duration = totalWidth / scrollSpeed;
  move.style.animation = `scroll ${duration}s linear infinite`;
}

// initial load
buildTicker();
</script>
