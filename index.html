<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PSR Control Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 40px;
    }

    h1 { margin-bottom: 30px; }

    button {
      padding: 12px 25px;
      font-size: 16px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1db954;
      color: white;
    }

    button:hover { background: #17a74a; }

    #albumArt {
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 18px;
      box-shadow: 0 0 35px #C9A227, 0 0 65px #B8860B;
    }

    #artist { font-size: 1.5em; font-weight: bold; margin-bottom: 5px; }
    #title { font-size: 1.2em; opacity: 0.9; margin-bottom: 20px; }

    input[type="text"] {
      width: 300px;
      padding: 8px;
      border-radius: 6px;
      border: none;
      margin-top: 15px;
    }

    p.status { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>

  <h1>🎧 Prodigal Sun Radio Control</h1>

  <img id="albumArt" src="https://i.imgur.com/QPevqGi.png">
  <div id="artist">Loading…</div>
  <div id="title">Please wait</div>

  <button onclick="postNowPlaying()">Post Now Playing to Facebook</button>
  <p id="fbStatus" class="status"></p>

  <div>
    <input type="text" id="newMessage" placeholder="Enter message for ticker">
    <button onclick="postMessage()">Add to Ticker</button>
    <p id="msgStatus" class="status"></p>
  </div>

  <script>
    const NOW_PLAYING_API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";
    const SHEET_POST_URL = "https://script.google.com/macros/s/AKfycbwUjfx6Wm0etSb4V3GO6WjxNp6veeAFcCtlSRZqJI3olyWGhhaZHM3Sa1KTeRwXN-Bo/exec"; // replace with your doPost URL

    // ================== UPDATE NOW PLAYING ==================
    async function updateNowPlaying() {
      try {
        const res = await fetch(NOW_PLAYING_API, { cache: "no-store" });
        const data = await res.json();

        const artist = data.artist || "Unknown Artist";
        const title = data.title || "Unknown Title";
        const cover = data.cover || "https://i.imgur.com/QPevqGi.png";

        document.getElementById("artist").textContent = artist;
        document.getElementById("title").textContent = title;
        document.getElementById("albumArt").src = cover;

      } catch(e) {
        document.getElementById("artist").textContent = "Stream Offline";
        document.getElementById("title").textContent = "";
      }
    }
    updateNowPlaying();
    setInterval(updateNowPlaying, 15000); // refresh every 15s

    // ================== POST NOW PLAYING ==================
    function postNowPlaying() {
      document.getElementById("fbStatus").innerText = "Sending...";
      fetch("https://hooks.zapier.com/hooks/catch/25494123/ugnx0s6/", {
        method: "POST"
      })
      .then(() => { document.getElementById("fbStatus").innerText = "Posted successfully!"; })
      .catch(() => { document.getElementById("fbStatus").innerText = "Error sending request."; });
    }

    // ================== POST MESSAGE TO SHEET ==================
    function postMessage() {
      const msg = document.getElementById("newMessage").value.trim();
      if(!msg) return alert("Please enter a message");

      document.getElementById("msgStatus").innerText = "Sending...";

      fetch(SHEET_POST_URL, {
        method: "POST",
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({message: msg})
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("msgStatus").innerText = "Message added!";
        document.getElementById("newMessage").value = "";
      })
      .catch(err => {
        console.error(err);
        document.getElementById("msgStatus").innerText = "Error adding message";
      });
    }
  </script>
</body>
</html>
