<script>
/* ========================= CONFIG ========================= */
const ticker = document.getElementById("psrTicker");
const scrollSpeed = 55; // px per second

// RadioKing Now Playing API
const NOW_PLAYING_API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

// Google Script doGet URL
const SHEET_API = "https://script.google.com/macros/s/AKfycbwUjfx6Wm0etSb4V3GO6WjxNp6veeAFcCtlSRZqJI3olyWGhhaZHM3Sa1KTeRwXN-Bo/exec";

/* ========================= HELPER FUNCTIONS ========================= */
async function getNowPlaying() {
  try {
    const res = await fetch(NOW_PLAYING_API, { cache: "no-store" });
    const data = await res.json();
    const artist = data.artist || "Unknown Artist";
    const title = data.title || "Unknown Title";
    return `🎵 Now Playing: ${artist} – ${title}`;
  } catch (e) {
    return "🎵 Music streaming live on Prodigal Sun Radio";
  }
}

async function getSheetMessages() {
  try {
    const res = await fetch(SHEET_API);
    const data = await res.json();
    return data; // expects array of strings
  } catch (err) {
    console.log("Error fetching ticker messages", err);
    return [];
  }
}

function addToTicker(text) {
  const span = document.createElement("span");
  span.textContent = text;
  ticker.appendChild(span);
}

/* ========================= BUILD TICKER ========================= */
async function buildTicker() {
  ticker.innerHTML = "";

  // Now Playing
  addToTicker(await getNowPlaying());

  // Messages from Google Sheet
  const sheetMessages = await getSheetMessages();
  if (sheetMessages.length === 0) {
    addToTicker("No messages yet. Add some via the control panel!");
  } else {
    sheetMessages.forEach(msg => addToTicker(msg));
  }

  // Duplicate for smooth scroll
  ticker.innerHTML += ticker.innerHTML;

  // Start scrolling
  const move = document.querySelector(".psr-move");
  const totalWidth = move.scrollWidth;
  const duration = totalWidth / scrollSpeed;
  move.style.animation = `scroll ${duration}s linear infinite`;
}

// Initial build
buildTicker();

// Refresh ticker every 10 seconds to catch new messages
setInterval(buildTicker, 10000);
</script>
