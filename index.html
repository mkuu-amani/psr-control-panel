<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PSR Control Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 50px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1db954;
      color: white;
    }

    button:hover {
      background: #17a74a;
    }

    #albumArt {
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 18px;
      box-shadow: 0 0 35px #C9A227, 0 0 65px #B8860B;
    }

    #artist {
      font-size: 1.5em;
      font-weight: bold;
      margin-bottom: 5px;
    }

    #title {
      font-size: 1.2em;
      opacity: 0.9;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <h1>🎧 Prodigal Sun Radio Control</h1>

  <img id="albumArt" src="https://i.imgur.com/QPevqGi.png">
  <div id="artist">Loading…</div>
  <div id="title">Please wait</div>

  <button onclick="postNowPlaying()">Post Now Playing to Facebook</button>
  <p id="status"></p>

  <script>
    const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

    async function updateNowPlaying() {
      try {
        const res = await fetch(API, { cache: "no-store" });
        const data = await res.json();

        const artist = data.artist || "Unknown Artist";
        const title = data.title || "Unknown Title";
        const cover = data.cover || "https://i.imgur.com/QPevqGi.png";

        document.getElementById("artist").textContent = artist;
        document.getElementById("title").textContent = title;
        document.getElementById("albumArt").src = cover;

      } catch(e) {
        document.getElementById("artist").textContent = "Stream Offline";
        document.getElementById("title").textContent = "";
      }
    }

    // refresh now playing every 15 seconds
    updateNowPlaying();
    setInterval(updateNowPlaying, 15000);

    function postNowPlaying() {
      document.getElementById("status").innerText = "Sending...";

      fetch("https://hooks.zapier.com/hooks/catch/25494123/ugnx0s6/", {
        method: "POST"
      })
      .then(() => {
        document.getElementById("status").innerText = "Posted successfully!";
      })
      .catch(() => {
        document.getElementById("status").innerText = "Error sending request.";
      });
    }
  </script>
</body>
</html>
