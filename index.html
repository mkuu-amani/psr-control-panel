<!-- PRODIGAL SUN RADIO CONTROL PANEL + MANUAL TICKER -->
<div class="control-panel">
  <h1>🎧 Prodigal Sun Radio Control</h1>

  <input type="text" id="newMessage" placeholder="Enter ticker message" style="width:300px; padding:10px; font-size:16px;">
  <button onclick="postMessage()">Add Message</button>
  <p id="status"></p>
</div>

<div class="psr-ticker">
  <div class="psr-label">PSR LIVE</div>
  <div class="psr-wrap">
    <div class="psr-move" id="psrTicker"></div>
  </div>
</div>

<style>
body { font-family: Arial,sans-serif; background:#111; color:#fff; text-align:center; padding:30px; }
button { padding:10px 20px; margin-left:10px; font-size:16px; cursor:pointer; background:#1db954; border:none; border-radius:6px; color:white; }
button:hover { background:#17a74a; }
input { border-radius:6px; border:none; margin-right:10px; }

.psr-ticker{
  display:flex;
  align-items:center;
  background:#0b0b0b;
  border-radius:14px;
  padding:10px 16px;
  overflow:hidden;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  margin-top:20px;
}

.psr-label{
  font-size:18px;
  font-weight:700;
  margin-right:14px;
  color:#f7c873;
  white-space:nowrap;
}

.psr-wrap{
  flex:1;
  overflow:hidden;
}

.psr-move{
  display:inline-flex;
  gap:56px;
  white-space:nowrap;
}

.psr-move span{
  font-size:18px;
  color:#f7c873;
}

@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

.psr-ticker:hover .psr-move{
  animation-play-state:paused;
}
</style>

<script>
const ticker = document.getElementById("psrTicker");
const scrollSpeed = 55; // px per second
const SHEET_API = "https://script.google.com/macros/s/AKfycbwUjfx6Wm0etSb4V3GO6WjxNp6veeAFcCtlSRZqJI3olyWGhhaZHM3Sa1KTeRwXN-Bo/exec";

// =========================
// TICKER FUNCTIONS
// =========================
async function getSheetMessages() {
  try {
    const res = await fetch(SHEET_API);
    const data = await res.json();
    return data; // array of strings
  } catch(err) {
    console.log("Error fetching ticker messages", err);
    return [];
  }
}

function addToTicker(text) {
  const span = document.createElement("span");
  span.textContent = text;
  ticker.appendChild(span);
}

// =========================
// BUILD TICKER
// =========================
async function buildTicker() {
  ticker.innerHTML = ""; // clear previous content

  const sheetMessages = await getSheetMessages();
  if(sheetMessages.length === 0){
    addToTicker("No messages yet. Add some via the control panel!");
  } else {
    sheetMessages.forEach(msg => addToTicker(msg));
  }

  // Duplicate for smooth scroll
  ticker.innerHTML += ticker.innerHTML;

  // Restart animation properly
  const move = document.querySelector(".psr-move");
  move.style.animation = "none";          // stop previous animation
  void move.offsetWidth;                  // force browser reflow
  const totalWidth = move.scrollWidth;
  const duration = totalWidth / scrollSpeed;
  move.style.animation = `scroll ${duration}s linear infinite`;
}

// =========================
// CONTROL PANEL POST FUNCTION
// =========================
async function postMessage() {
  const input = document.getElementById("newMessage");
  const msg = input.value.trim();
  const status = document.getElementById("status");
  if(!msg) return;

  status.innerText = "Sending...";
  
  try {
    await fetch(SHEET_API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });

    status.innerText = "Message added!";
    input.value = "";

    // Rebuild ticker immediately after posting
    buildTicker();

  } catch(e) {
    console.error(e);
    status.innerText = "Error sending message.";
  }
}

// =========================
// INITIAL LOAD + AUTO REFRESH
// =========================
buildTicker();

// auto-refresh ticker every 10 seconds to catch new messages from other users/devices
setInterval(buildTicker, 10000);
</script>
