<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PSR Control Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 50px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1db954;
      color: white;
    }

    button:hover {
      background: #17a74a;
    }

    /* NEW (minimal styling only) */
    #cover {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      margin-top: 20px;
    }

    #track {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>🎧 Prodigal Sun Radio Control</h1>

  <!-- NEW: Now Playing -->
  <img id="cover" src="https://i.imgur.com/QPevqGi.png">
  <div id="track">Loading current track...</div>

  <button onclick="postNowPlaying()">Post Now Playing</button>

  <p id="status"></p>

  <script>
    /* EXISTING FUNCTION (UNCHANGED) */
    function postNowPlaying() {
      document.getElementById("status").innerText = "Sending...";

      fetch("https://hooks.zapier.com/hooks/catch/25494123/ugnx0s6/", {
        method: "POST"
      })
      .then(response => {
        document.getElementById("status").innerText = "Posted successfully!";
      })
      .catch(error => {
        document.getElementById("status").innerText = "Error sending request.";
      });
    }

    /* NEW: Now Playing Fetch */
    const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

    async function updateNowPlaying() {
      try {
        const res = await fetch(API, { cache: "no-store" });
        const data = await res.json();

        const artist = data.artist || "Unknown Artist";
        const title = data.title || "Unknown Title";
        const cover = data.cover || "https://i.imgur.com/QPevqGi.png";

        document.getElementById("track").innerText =
          artist + " - " + title;

        document.getElementById("cover").src = cover;

      } catch (err) {
        document.getElementById("track").innerText =
          "Unable to load track";
      }
    }

    // Run immediately + every 15 seconds
    updateNowPlaying();
    setInterval(updateNowPlaying, 15000);
  </script>

</body>
</html>
